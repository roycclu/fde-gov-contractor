<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ExaGov{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0A2A66', dark: '#061B45', light: '#EAF0FA' },
            ink:   { DEFAULT: '#0C1729', muted: '#4B5D79', subtle: '#8091AD' },
            surface: { DEFAULT: '#FFFFFF', raised: '#F3F6FB', border: '#D9E1EE' },
            header: '#06142E',
            metallic: '#B89C56',
          },
          fontFamily: {
            sans: ['Manrope', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['Cormorant Garamond', 'ui-serif', 'Georgia', 'serif'],
          },
          boxShadow: {
            'card':      '0 8px 24px rgba(9, 24, 55, 0.08), 0 0 0 1px rgba(8, 28, 67, 0.06)',
            'card-hover':'0 14px 30px rgba(9, 24, 55, 0.14), 0 0 0 1px rgba(8, 28, 67, 0.08)',
            'search':    '0 6px 20px rgba(9, 24, 55, 0.12), 0 0 0 1px rgba(8, 28, 67, 0.08)',
            'search-focus': '0 0 0 3px rgba(10, 42, 102, 0.24)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ─── Tag colours ─── */
    .tag-rfp       { background:#F0FDF4; color:#14532D; }
    .accent-rfp    { background:#16A34A; }
    .tab-rfp       { --tab-c:#16A34A; }

    .tag-incumbent { background:#EFF6FF; color:#1E3A8A; }
    .accent-incumbent { background:#2563EB; }
    .tab-incumbent { --tab-c:#2563EB; }

    .tag-news      { background:#FFFBEB; color:#78350F; }
    .accent-news   { background:#D97706; }
    .tab-news      { --tab-c:#D97706; }

    /* ─── Card ─── */
    .result-card {
      animation: riseIn .32s cubic-bezier(.22,.68,0,1.2) both;
      transition: box-shadow .18s ease, transform .18s ease;
    }
    .result-card:hover { transform: translateY(-1px); }
    .result-card:nth-child(1) { animation-delay: 0s; }
    .result-card:nth-child(2) { animation-delay: .05s; }
    .result-card:nth-child(3) { animation-delay: .10s; }
    .result-card:nth-child(4) { animation-delay: .15s; }
    .result-card:nth-child(5) { animation-delay: .20s; }
    .result-card:nth-child(6) { animation-delay: .25s; }
    .result-card:nth-child(7) { animation-delay: .30s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Tab ─── */
    .tab-btn {
      transition: background .15s ease, color .15s ease, box-shadow .15s ease;
    }
    .tab-btn.active {
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      color: #0D1117;
    }
    .tab-btn:not(.active) { color: #64748B; }
    .tab-btn:not(.active):hover { color: #0D1117; background: rgba(255,255,255,.5); }

    /* ─── Skeleton ─── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    /* ─── Why-box ─── */
    .why-box {
      background: #F4F8FF;
      border-left: 3px solid #6D89BE;
    }

    /* ─── Brief prose ─── */
    .prose-brief h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #0D1117;
      margin: 2rem 0 .75rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid #E2E8F0;
    }
    .prose-brief h3 { font-size: .9375rem; font-weight: 600; color: #1E293B; margin: 1.25rem 0 .5rem; }
    .prose-brief p  { font-size: .9375rem; color: #475569; line-height: 1.7; margin-bottom: .75rem; }
    .prose-brief ul { list-style: disc; padding-left: 1.25rem; margin-bottom: .75rem; }
    .prose-brief li { font-size: .9375rem; color: #475569; line-height: 1.7; margin-bottom: .25rem; }
    .prose-brief strong { color: #1E293B; font-weight: 600; }
    .prose-brief table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .875rem; }
    .prose-brief th { text-align: left; padding: .625rem .875rem; background: #F8FAFC; color: #334155; font-weight: 600; border: 1px solid #E2E8F0; }
    .prose-brief td { padding: .625rem .875rem; color: #475569; border: 1px solid #E2E8F0; }
    .prose-brief tr:nth-child(even) td { background: #F8FAFC; }
  </style>
</head>

<body class="bg-surface-raised min-h-screen font-sans text-ink antialiased">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="bg-header sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-5 py-0 flex items-center justify-between h-14">

      <!-- Logo -->
      <a href="{{ request.url_for('root') }}" class="flex items-center gap-2.5 group">
        <div class="w-7 h-7 bg-brand rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <span class="text-white font-semibold text-[15px] tracking-[0.02em]">ExaGov</span>
      </a>

      <!-- Nav -->
      <nav class="flex items-center gap-1">
        <a href="{{ request.url_for('brief') }}"
           class="text-slate-400 hover:text-white text-sm font-medium px-3.5 py-1.5 rounded-md hover:bg-white/10 transition-all">
          Market Brief
        </a>
        <a href="https://exa.ai" target="_blank" rel="noopener"
           class="ml-1 flex items-center gap-1.5 bg-white/10 hover:bg-white/20 text-white text-xs font-medium px-3 py-1.5 rounded-md transition-all">
          <span>Powered by Exa</span>
          <svg class="w-3 h-3 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
        </a>
      </nav>
    </div>
  </header>

  <!-- ── Content ────────────────────────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer class="border-t border-surface-border mt-20">
    <div class="max-w-5xl mx-auto px-5 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-ink-subtle">
      <span>ExaGov — Exa FDE Take-home Demo</span>
      <div class="flex items-center gap-4">
        <a href="{{ request.url_for('brief') }}" class="hover:text-ink-muted transition-colors">Market Brief</a>
        <a href="https://exa.ai" target="_blank" class="hover:text-ink-muted transition-colors">Exa API</a>
        <a href="https://sam.gov" target="_blank" class="hover:text-ink-muted transition-colors">SAM.gov</a>
      </div>
    </div>
  </footer>

</body>
</html>
